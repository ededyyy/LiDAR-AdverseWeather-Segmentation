data:
  num_classes: 19
  ignore_label: 255
  training_size: 19132

train:
  seed: 1588147245
  deterministic: False

src_dataset:
  name: semantickitti
  root: /root/autodl-tmp/SemanticKITTI/dataset/sequences  # change to my own path
  num_points: 80000
  voxel_size: 0.05

tgt_dataset:
  name: semanticstf
  root: /root/autodl-tmp/SemanticSTF  # change to my own path
  num_points: 80000
  voxel_size: 0.05

num_epochs: 50
batch_size: 4
workers_per_gpu: 4 # new

criterion:
  name: cross_entropy
  ignore_index: 255

optimizer:
  name: sgd
  lr: 2.4e-1
  weight_decay: 1.0e-4
  momentum: 0.9
  nesterov: true

scheduler:
  name: cosine_warmup
